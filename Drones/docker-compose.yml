version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: drones-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${DB_PORT}:1433"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drones-api
    ports:
      - "${API_PORT}:8080"
    env_file:
      - .env
    environment:
      ConnectionStrings__DronesDb: "Server=db,1433;Database=DronesDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    depends_on:
      - redis
